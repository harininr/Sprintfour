kind = "web"
previewPath = "/"
title = "Redaction Review"
version = "1.0.0"
id = "artifacts/redact-review"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18767

[services.development]
run = "pnpm --filter @workspace/redact-review run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/redact-review", "run", "build" ]
publicDir = "artifacts/redact-review/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18767"
BASE_PATH = "/"
